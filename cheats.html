<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rivals.lua - Internal V4 [BETA]</title>

<script data-goatcounter="https://notfleapz.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>

<style>
:root {
    --bg: #080808;
    --side: #050505;
    --accent: #ff004c;
    --border: #1a1a1a;
    --text: #ffffff;
    --dim: #555;
}

body {
    background-color: #111;
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
}

.window {
    width: 720px;
    height: 480px;
    background: var(--bg);
    border: 1px solid var(--border);
    display: flex;
    box-shadow: 0 0 40px rgba(0,0,0,0.9);
}

/* Sidebar */
.sidebar {
    width: 170px;
    background: var(--side);
    border-right: 1px solid var(--border);
    padding: 15px 0;
}

.brand {
    font-size: 16px;
    font-weight: 800;
    padding: 0 20px 20px;
    color: var(--accent);
}

.tab-btn {
    padding: 12px 20px;
    font-size: 11px;
    color: var(--dim);
    cursor: pointer;
}

.tab-btn.active {
    color: #fff;
    border-left: 3px solid var(--accent);
}

/* Main */
.main {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

.footer {
    margin-top: auto;
    border-top: 1px solid var(--border);
    padding-top: 15px;
    display: flex;
    justify-content: space-between;
}

.btn-main {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 25px;
    font-weight: bold;
    cursor: pointer;
}

/* Trap */
#trap {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: black;
    z-index: 1000;
}

#counterText {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 22px;
    font-weight: bold;
    color: white;
    z-index: 1001;
}
</style>
</head>

<body>

<div class="window">
    <div class="sidebar">
        <div class="brand">RIVALS.CORE</div>
        <div class="tab-btn active">Combat</div>
        <div class="tab-btn">Visuals</div>
        <div class="tab-btn">Movement</div>
        <div class="tab-btn">Server-Side</div>
    </div>

    <div class="main">
        <div style="flex:1"></div>

        <div class="footer">
            <div style="font-size: 10px; color: var(--dim);">
                Build: 01.04.2026 // Status: <span style="color:#00ff88">Undetected</span>
            </div>
            <button class="btn-main" onclick="ignite()">EXECUTE ALL (F1)</button>
        </div>
    </div>
</div>

<div id="trap">
    <div id="counterText">Loading...</div>
    <iframe id="vid" width="100%" height="100%" frameborder="0" allow="autoplay"></iframe>
</div>

<script>
async function ignite() {

    // GoatCounter tracking
    if (window.goatcounter && window.goatcounter.count) {
        window.goatcounter.count({
            path: 'execute-cheats-click',
            title: 'User Clicked Execute All',
            event: true
        });
    }

    let text = "Loading...";

    try {
        const res = await fetch("https://clicks.notfleapz.workers.dev");
        const data = await res.json();

        text = `💀 you are victim #${data.count}`;
    } catch (e) {
        text = "💀 you fell for it";
    }

    // Show trap
    document.getElementById("trap").style.display = "block";
    document.getElementById("vid").src = "https://cdn.mtdv.me/video/rick.mp4";

    // Show count
    document.getElementById("counterText").innerText = text;
}
</script>

</body>
</html>
